<body>

        <button class="swapbutton" data-swf="henry-stickmin-escaping-the-prison.swf">Henry Stickmin: Escaping the Prison</button>

        <button class="swapbutton" data-swf="Age_Of_War.swf">Age Of War</button>
    </div>

    <div id="ruffle-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};

        function loadGame(swfFile) {
            const container = document.getElementById("ruffle-container");

            // Clear previous game
            container.innerHTML = "";

            // Create new Ruffle player
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();

            container.appendChild(player);

            // Load the selected SWF
            player.load({
                url: "SWFs/" + swfFile,
                backgroundColor: "#000000",
            });
        }

        // Attach button listeners
        document.querySelectorAll(".swapbutton").forEach(btn => {
            btn.addEventListener("click", () => {
                const swf = btn.dataset.swf;
                loadGame(swf);
            });
        });
    </script>
